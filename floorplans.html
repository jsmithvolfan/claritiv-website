<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claritiv Health — Clinic Floor Plans & Schematics</title>
<meta name="description" content="Architectural floor plans and schematics for Claritiv Health clinic spaces.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C5A86B;--gold2:#D7BD64;--navy:#132B4C;--navy-dark:#0B2143;
  --cream:#FDF7F4;--white:#FFFFFF;
  --font-heading:'Cormorant Garamond',Georgia,serif;
  --font-body:'Inter',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--navy-dark);
  color:var(--white);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* Background pattern */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(197,168,107,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(197,168,107,.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(19,43,76,.5) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

.container{
  position:relative;z-index:1;
  text-align:center;
  padding:40px 24px;
  max-width:640px;
  animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.logo-area{margin-bottom:48px}
.logo-area img{
  height:60px;margin:0 auto 16px;
  filter:drop-shadow(0 0 12px rgba(197,168,107,.3));
}
.logo-text{
  font-family:var(--font-heading);
  color:var(--gold);
  font-size:1rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  font-weight:400;
}

h1{
  font-family:var(--font-heading);
  font-size:clamp(2rem,5vw,3.2rem);
  font-weight:400;
  color:var(--white);
  line-height:1.2;
  margin-bottom:12px;
}
h1 span{color:var(--gold);font-style:italic}

.subtitle{
  font-size:1rem;
  color:rgba(255,255,255,.6);
  line-height:1.6;
  margin-bottom:48px;
  font-weight:300;
}

.btn{
  display:inline-flex;
  align-items:center;
  gap:12px;
  padding:18px 48px;
  background:linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color:var(--navy-dark);
  font-family:var(--font-body);
  font-size:.9rem;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  text-decoration:none;
  border-radius:4px;
  transition:all .3s ease;
  box-shadow:0 4px 24px rgba(197,168,107,.3);
}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(197,168,107,.45);
}
.btn svg{width:20px;height:20px;transition:transform .3s}
.btn:hover svg{transform:translateX(4px)}

.back-link{
  display:inline-block;
  margin-top:32px;
  font-size:.8rem;
  color:rgba(255,255,255,.4);
  text-decoration:none;
  letter-spacing:.06em;
  text-transform:uppercase;
  transition:color .3s;
}
.back-link:hover{color:var(--gold)}

/* Blueprint decorative grid */
.grid-bg{
  position:fixed;inset:0;z-index:0;
  opacity:.03;
  background-image:
    linear-gradient(rgba(197,168,107,.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(197,168,107,.5) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="container">
  <div class="logo-area">
    <a href="/">
      <img src="assets/logos/original-logo.png" alt="Claritiv Health">
    </a>
    <div class="logo-text">Claritiv Health</div>
  </div>

  <h1>Clinic <span>Floor Plans</span> &amp; Schematics</h1>
  <p class="subtitle">
    Architectural layouts and space planning for our premium ketamine infusion therapy clinic.
  </p>

  <a href="https://claude.ai/public/artifacts/9ef27ba9-7e21-4eee-9020-1022bdc20cd0"
     target="_blank" rel="noopener noreferrer" class="btn">
    View Floor Plans
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      <polyline points="15 3 21 3 21 9"/>
      <line x1="10" y1="14" x2="21" y2="3"/>
    </svg>
  </a>

  <br>
  <a href="/" class="back-link">← Back to Claritiv Health</a>
</div>

<script>
// Auto-open the artifact on page load
window.addEventListener('load', function() {
  window.open('https://claude.ai/public/artifacts/9ef27ba9-7e21-4eee-9020-1022bdc20cd0', '_blank');
});
</script>
</body>
</html>
